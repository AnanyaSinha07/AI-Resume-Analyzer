<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            width:600px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
        }

        input, textarea{
            width:100%;
            margin-top:10px;
            margin-bottom:20px;
            padding:10px;
        }

        button{
            width:100%;
            padding:12px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>AI Resume Analyzer</h1>

    <form>

        <label>Upload Resume (PDF)</label>
        <input type="file">

        <label>Job Description</label>

        <textarea rows="8"></textarea>

        <button type="submit">
            Analyze Resume
        </button>

    </form>

</div>

</body>
</html>
